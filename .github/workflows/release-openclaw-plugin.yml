name: Release OpenClaw Plugin

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Plugin version (must match package.json, e.g. 0.1.2)"
        required: true
      oss_path_prefix:
        description: "OSS path prefix under bucket (e.g. opentelemetry-instrumentation-openclaw)"
        required: true
        default: "opentelemetry-instrumentation-openclaw"
      create_latest_alias:
        description: "Also upload files to /latest path"
        required: true
        default: true
        type: boolean
      dry_run:
        description: "Build/package only, skip OSS upload and GitHub release"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release-openclaw-plugin:
    runs-on: ubuntu-latest
    env:
      PLUGIN_DIR: opentelemetry-instrumentation-openclaw
      PLUGIN_NAME: opentelemetry-instrumentation-openclaw
      TAG_PREFIX: opentelemetry-instrumentation-openclaw/v
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: opentelemetry-instrumentation-openclaw/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.PLUGIN_DIR }}
        run: npm ci

      - name: Run tests
        working-directory: ${{ env.PLUGIN_DIR }}
        run: npm test

      - name: Validate release version
        id: validate_version
        run: |
          PACKAGE_VERSION="$(node -p "require('./${PLUGIN_DIR}/package.json').version")"
          INPUT_VERSION="${{ github.event.inputs.version }}"
          if [ "${PACKAGE_VERSION}" != "${INPUT_VERSION}" ]; then
            echo "Version mismatch: package.json=${PACKAGE_VERSION}, input=${INPUT_VERSION}" >&2
            exit 1
          fi
          echo "package_version=${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG_PREFIX}${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build and package
        working-directory: ${{ env.PLUGIN_DIR }}
        run: bash scripts/pack.sh

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          cp "${PLUGIN_DIR}/release/${PLUGIN_NAME}.tar.gz" release-assets/
          cp "${PLUGIN_DIR}/scripts/install.sh" release-assets/
          cp "${PLUGIN_DIR}/scripts/install-wget.sh" release-assets/
          cp "${PLUGIN_DIR}/scripts/uninstall.sh" release-assets/
          (cd release-assets && sha256sum * > SHA256SUMS)
          cat > release-assets/RELEASE_NOTES.md <<EOF
          ## ${PLUGIN_NAME} v${{ steps.validate_version.outputs.package_version }}

          ### Assets
          - ${PLUGIN_NAME}.tar.gz
          - install.sh
          - install-wget.sh
          - uninstall.sh
          - SHA256SUMS
          EOF

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}-${{ steps.validate_version.outputs.package_version }}
          path: release-assets/*

      - name: Install ossutil
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          curl -fsSL "https://gosspublic.alicdn.com/ossutil/1.7.18/ossutil64" -o ossutil64
          chmod +x ossutil64

      - name: Upload assets to OSS (versioned path)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
        run: |
          test -n "${OSS_BUCKET}" && test -n "${OSS_ENDPOINT}" && test -n "${OSS_ACCESS_KEY_ID}" && test -n "${OSS_ACCESS_KEY_SECRET}"
          OSS_BASE="oss://${OSS_BUCKET}/${{ github.event.inputs.oss_path_prefix }}/${{ steps.validate_version.outputs.package_version }}"
          ./ossutil64 cp release-assets/ "${OSS_BASE}/" -r \
            --endpoint "${OSS_ENDPOINT}" \
            --access-key-id "${OSS_ACCESS_KEY_ID}" \
            --access-key-secret "${OSS_ACCESS_KEY_SECRET}" \
            --update

      - name: Upload assets to OSS (latest alias)
        if: ${{ github.event.inputs.dry_run != 'true' && github.event.inputs.create_latest_alias == 'true' }}
        env:
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
        run: |
          OSS_LATEST="oss://${OSS_BUCKET}/${{ github.event.inputs.oss_path_prefix }}/latest"
          ./ossutil64 cp release-assets/ "${OSS_LATEST}/" -r \
            --endpoint "${OSS_ENDPOINT}" \
            --access-key-id "${OSS_ACCESS_KEY_ID}" \
            --access-key-secret "${OSS_ACCESS_KEY_SECRET}" \
            --update

      - name: Check release tag does not exist
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          TAG="${{ steps.validate_version.outputs.tag }}"
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag already exists: ${TAG}" >&2
            exit 1
          fi

      - name: Create and push release tag
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          TAG="${{ steps.validate_version.outputs.tag }}"
          git tag "${TAG}"
          git push origin "${TAG}"

      - name: Create GitHub Release
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.validate_version.outputs.tag }}"
          gh release create "${TAG}" \
            release-assets/${PLUGIN_NAME}.tar.gz \
            release-assets/install.sh \
            release-assets/install-wget.sh \
            release-assets/uninstall.sh \
            release-assets/SHA256SUMS \
            --title "${PLUGIN_NAME} v${{ steps.validate_version.outputs.package_version }}" \
            --notes-file release-assets/RELEASE_NOTES.md \
            --repo "${{ github.repository }}"
